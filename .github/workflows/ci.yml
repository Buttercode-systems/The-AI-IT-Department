name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install --silent
      - name: Typecheck
        shell: bash
        run: set -o pipefail; npm run typecheck 2>&1 | tail -120
      - name: Test
        shell: bash
        run: set -o pipefail; npm run test 2>&1 | tail -120
      - name: Build
        shell: bash
        run: set -o pipefail; npm run build 2>&1 | tail -160
